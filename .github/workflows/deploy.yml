name: Careero CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: careero-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          retention-days: 7

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Check deployment configuration
        id: deployment
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Vercel deployment skipped: repository secrets are not configured."
          fi
      - uses: actions/setup-node@v4
        if: steps.deployment.outputs.configured == 'true'
        with:
          node-version: 24
          cache: npm
      - if: steps.deployment.outputs.configured == 'true'
        run: npm ci
      - if: steps.deployment.outputs.configured == 'true'
        run: npx --yes vercel@56.3.2 pull --yes --environment=production --token="$VERCEL_TOKEN"
      - if: steps.deployment.outputs.configured == 'true'
        run: npx --yes vercel@56.3.2 build --prod --token="$VERCEL_TOKEN"
      - if: steps.deployment.outputs.configured == 'true'
        run: npx --yes vercel@56.3.2 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
